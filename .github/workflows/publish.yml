name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish
